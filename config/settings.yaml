# ============================================================
# Provider & Model Configuration
# ============================================================
# 添加新 provider: 复制模板 → 填 base_url + api_key_env
# 添加新 model:    复制模板 → 填 id + provider
# 默认使用 Anthropic 协议
# ============================================================

providers:
  # --- 聚合平台 ---
  zenmux-anthropic:
    base_url: "https://zenmux.ai/api/anthropic"
    api_key_env: "ZENMUX_API_KEY"
    protocol: "anthropic"

  zenmux-openai:
    base_url: "https://zenmux.ai/api/v1"
    api_key_env: "ZENMUX_API_KEY"
    protocol: "openai"

  # --- 官方 API (默认 Anthropic 协议) ---
  minimax:
    base_url: "https://api.minimaxi.com/anthropic"
    api_key_env: "MINIMAX_API_KEY"
    protocol: "anthropic"

  mimo:
    base_url: "https://api.xiaomimimo.com/anthropic"
    api_key_env: "MIMO_API_KEY"
    protocol: "anthropic"

  # 添加新 provider 模板:
  # new-provider:
  #   base_url: "https://api.new-provider.com/anthropic"
  #   api_key_env: "NEW_PROVIDER_API_KEY"
  #   protocol: "anthropic"

models:
  # --- Google (via ZenMux) ---
  - id: "zenmux-openai/google/gemini-3.1-pro-preview"
    provider: "zenmux-openai"
    purpose: ["fast_chat", "coding", "reasoning"]
    capabilities: ["tool_calling", "long_context"]
    max_context: 1000000
    cost_tier: "low"
    default: true

  # --- OpenAI (via ZenMux) ---
  - id: "zenmux-openai/openai/gpt-4.1-mini"
    provider: "zenmux-openai"
    purpose: ["fast_chat", "simple_qa"]
    capabilities: ["low_latency", "low_cost", "tool_calling"]
    max_context: 128000
    cost_tier: "low"

  - id: "zenmux-openai/openai/gpt-4.1"
    provider: "zenmux-openai"
    purpose: ["coding", "reasoning", "planning"]
    capabilities: ["strong_reasoning", "tool_calling", "long_context"]
    max_context: 128000
    cost_tier: "high"

  # --- Anthropic (via ZenMux) ---
  - id: "zenmux-anthropic/anthropic/claude-sonnet-4-20250514"
    provider: "zenmux-anthropic"
    purpose: ["analysis", "coding", "planning"]
    capabilities: ["strong_reasoning", "tool_calling", "long_context"]
    max_context: 200000
    cost_tier: "high"

  # --- MiniMax (官方) ---
  - id: "minimax/MiniMax-M2.7"
    provider: "minimax"
    purpose: ["fast_chat", "reasoning"]
    capabilities: ["tool_calling"]
    max_context: 128000
    cost_tier: "low"

  # --- Mimo (官方) ---
  - id: "mimo/mimo-v2.5-pro"
    provider: "mimo"
    purpose: ["fast_chat", "coding", "reasoning"]
    capabilities: ["tool_calling"]
    max_context: 128000
    cost_tier: "low"

  # 添加新 model 模板:
  # - id: "provider-name/model-name"
  #   provider: "provider-name"
  #   purpose: ["fast_chat"]
  #   capabilities: ["tool_calling"]
  #   max_context: 128000
  #   cost_tier: "low"

engine: "state_machine"

routing:
  default_model: "zenmux-openai/google/gemini-3.1-pro-preview"
  fallback_model: "zenmux-openai/openai/gpt-4.1-mini"
