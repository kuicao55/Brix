# ============================================================
# Provider & Model Configuration
# ============================================================
# Structure:
#   providers:  每个 provider = base_url + api_key_env + protocol
#   models:     model id 格式 = provider/model-name
#
# 添加新 provider: 只需加 base_url + api_key_env + protocol
# 添加新 model:    只需加 id + provider + 用途标签
#
# protocol 只有两种:
#   "openai"    — OpenAI 兼容协议（绝大多数模型）
#   "anthropic" — Anthropic Messages 协议
# ============================================================

providers:
  # --- 聚合平台 ---
  zenmux-openai:
    base_url: "https://zenmux.ai/api/v1"
    api_key_env: "ZENMUX_API_KEY"
    protocol: "openai"

  zenmux-anthropic:
    base_url: "https://zenmux.ai/api/anthropic"
    api_key_env: "ZENMUX_API_KEY"
    protocol: "anthropic"

  # --- 官方 API ---
  minimax:
    base_url: "https://api.minimax.chat/v1"
    api_key_env: "MINIMAX_API_KEY"
    protocol: "openai"

  mimo:
    base_url: "https://api.xiaomi.com/v1"
    api_key_env: "MIMO_API_KEY"
    protocol: "openai"

  # 添加新 provider 只需复制下面模板:
  # new-provider:
  #   base_url: "https://api.new-provider.com/v1"
  #   api_key_env: "NEW_PROVIDER_API_KEY"
  #   protocol: "openai"

models:
  # --- Google (via ZenMux) ---
  - id: "zenmux-openai/google/gemini-3.1-pro-preview"
    provider: "zenmux-openai"
    purpose: ["fast_chat", "coding", "reasoning"]
    capabilities: ["tool_calling", "long_context"]
    max_context: 1000000
    cost_tier: "low"
    default: true

  # --- OpenAI (via ZenMux) ---
  - id: "zenmux-openai/openai/gpt-4.1-mini"
    provider: "zenmux-openai"
    purpose: ["fast_chat", "simple_qa"]
    capabilities: ["low_latency", "low_cost", "tool_calling"]
    max_context: 128000
    cost_tier: "low"

  - id: "zenmux-openai/openai/gpt-4.1"
    provider: "zenmux-openai"
    purpose: ["coding", "reasoning", "planning"]
    capabilities: ["strong_reasoning", "tool_calling", "long_context"]
    max_context: 128000
    cost_tier: "high"

  # --- Anthropic (via ZenMux) ---
  - id: "zenmux-anthropic/anthropic/claude-sonnet-4-20250514"
    provider: "zenmux-anthropic"
    purpose: ["analysis", "coding", "planning"]
    capabilities: ["strong_reasoning", "tool_calling", "long_context"]
    max_context: 200000
    cost_tier: "high"

  # --- MiniMax (官方) ---
  - id: "minimax/minimax-m1"
    provider: "minimax"
    purpose: ["fast_chat", "reasoning"]
    capabilities: ["tool_calling"]
    max_context: 1000000
    cost_tier: "low"

  # --- Mimo (官方) ---
  - id: "mimo/mimo-v2.5-pro"
    provider: "mimo"
    purpose: ["fast_chat", "coding", "reasoning"]
    capabilities: ["tool_calling"]
    max_context: 128000
    cost_tier: "low"

  # 添加新 model 只需复制下面模板:
  # - id: "provider-name/model-name"
  #   provider: "provider-name"
  #   purpose: ["fast_chat"]
  #   capabilities: ["tool_calling"]
  #   max_context: 128000
  #   cost_tier: "low"

engine: "state_machine"

routing:
  default_model: "zenmux-openai/google/gemini-3.1-pro-preview"
  fallback_model: "zenmux-openai/openai/gpt-4.1-mini"
