providers:
  openai:
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    protocol: "openai"

  anthropic:
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    protocol: "anthropic"

  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    protocol: "openai"

models:
  - id: "gpt-4.1-mini"
    provider: "openai"
    purpose: ["fast_chat", "simple_qa"]
    capabilities: ["low_latency", "low_cost", "tool_calling"]
    max_context: 128000
    cost_tier: "low"
    default: true

  - id: "gpt-4.1"
    provider: "openai"
    purpose: ["coding", "reasoning", "planning"]
    capabilities: ["strong_reasoning", "tool_calling", "long_context"]
    max_context: 128000
    cost_tier: "high"

  - id: "claude-sonnet-4-20250514"
    provider: "anthropic"
    purpose: ["analysis", "coding", "planning"]
    capabilities: ["strong_reasoning", "tool_calling", "long_context"]
    max_context: 200000
    cost_tier: "high"

routing:
  default_model: "gpt-4.1-mini"
  fallback_model: "gpt-4.1-mini"
